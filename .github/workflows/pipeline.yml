name: Pipeline

on:
  pull_request:
    branches:
      - main
      - development
  push:
    branches:
      - main
      - development

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install Firebase Functions dependencies
        run: npm --prefix functions ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Lint app
        run: npm run lint

      - name: Lint Firebase Functions
        run: npm --prefix functions run lint

      - name: Typecheck app
        run: npm run typecheck

      - name: Build app
        run: npm run build

      - name: Run Playwright tests
        run: npm run test:e2e

  deploy_preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/development'
    environment: development
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Pull Vercel preview environment
        run: npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"

      - name: Build Vercel preview output
        run: npx vercel build --token="$VERCEL_TOKEN"

      - name: Deploy Vercel preview
        run: npx vercel deploy --prebuilt --token="$VERCEL_TOKEN"

  deploy_production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            functions/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Pull Vercel production environment
        run: npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build Vercel production output
        run: npx vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy Vercel production
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
